config_version = "0"

exclude_patterns = [
  "*_min.*",
  "*-min.*",
  "*.min.*",
  "**/.yarn/**",
  "**/*.d.ts",
  "**/assets/**",
  "**/bower_components/**",
  "**/build/**",
  "**/cache/**",
  "**/config/**",
  "**/db/**",
  "**/deps/**",
  "**/dist/**",
  "**/extern/**",
  "**/external/**",
  "**/generated/**",
  "**/Godeps/**",
  "**/gradlew/**",
  "**/mvnw/**",
  "**/node_modules/**",
  "**/protos/**",
  "**/seed/**",
  "**/target/**",
  "**/templates/**",
  "**/testdata/**",
  "**/vendor/**",
]

test_patterns = [
  "**/test/**",
  "**/spec/**",
  "**/*.test.*",
  "**/*.spec.*",
  "**/*_test.*",
  "**/*_spec.*",
  "**/test_*.*",
  "**/spec_*.*",
]

[smells]
mode = "comment"

[[source]]
name = "default"
default = true


[[plugin]]
name = "actionlint"

[[plugin]]
name = "ripgrep"
mode = "comment"

[[plugin]]
name = "shellcheck"

# trivy is intentionally omitted: qlty pins trivy@0.67.2 and the qlty
# download proxy (github-proxy.qlty.sh) returns 404 for that release, so
# the plugin cannot install and the job errors with "Build errored"
# rather than producing findings — a non-deterministic CI red tied to an
# upstream outage, not this repo. trivy was configured here with only the
# `config` driver (GitHub Actions / IaC misconfiguration), which is fully
# covered by checkov below (workflow token permissions, action pinning,
# etc.); secrets and dependencies are covered by gitleaks, trufflehog,
# semgrep, and osv-scanner. No rule coverage is lost by omitting it.

[[plugin]]
name = "trufflehog"

[[plugin]]
name = "semgrep"

[[plugin]]
name = "osv-scanner"

[[plugin]]
name = "gitleaks"

[[plugin]]
name = "checkov"
