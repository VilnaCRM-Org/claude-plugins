# Validation campaign for the php-backend-sdlc `security-audit` skill: proves the
# skill's detection lanes flag the seeded vulnerable fixtures (true positives)
# and stay silent on their secure counterparts (true negatives). The Python
# harness mirrors the python-quality.yml conventions (ruff/ty/xenon/bandit/
# 100% coverage via uv/uvx); the static lane adds a real semgrep run over the
# fixture corpus.
name: Security-Audit Validation

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read

env:
  SRC: tools/security-audit-validation/detect.py tools/security-audit-validation/corpus.py tools/security-audit-validation/judge/run_seed_judge.py
  ALL: tools/security-audit-validation

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Install uv (pinned)
        run: |
          pipx install uv==0.9.21
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Ruff lint
        run: uvx ruff@0.15.6 check $ALL
      - name: Ruff format check
        run: uvx ruff@0.15.6 format --check $ALL

  ty:
    name: Ty
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Install uv (pinned)
        run: |
          pipx install uv==0.9.21
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Ty type check
        run: |
          uvx ty@0.0.21 check $SRC \
            --extra-search-path tools/security-audit-validation \
            --extra-search-path tools/security-audit-validation/judge

  maintainability:
    name: Maintainability
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Install uv (pinned)
        run: |
          pipx install uv==0.9.21
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Xenon complexity gate (max block B, module B, average A)
        run: uvx xenon@0.9.3 --max-absolute B --max-modules B --max-average A $SRC

  security:
    name: Security (bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Install uv (pinned)
        run: |
          pipx install uv==0.9.21
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Bandit security scan
        run: uvx 'bandit[toml]@1.8.6' -c pyproject.toml -r $ALL

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Install uv (pinned)
        run: |
          pipx install uv==0.9.21
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Coverage (unittest, fail under 100%)
        run: |
          uvx coverage@7.6.7 run --source=tools/security-audit-validation \
            --omit='*/tests/*' \
            -m unittest discover -s tools/security-audit-validation/tests \
            -t tools/security-audit-validation
          uvx coverage@7.6.7 report --fail-under=100

  static-detect:
    name: Static detection (semgrep TP/TN)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Install semgrep (pinned)
        run: |
          python -m pip install --upgrade pip
          python -m pip install semgrep==1.165.0
      - name: Run detection harness (TP/TN per fixture)
        run: python3 tools/security-audit-validation/detect.py

  seed-judge:
    name: Seed judge (LLM, skip-clean)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      # No claude CLI on the runner: the lane SKIPS with exit 0 (never a false
      # green). It is the lane a credentialed local/manual run exercises with
      # `--gate`. Documented in tools/security-audit-validation/README.md.
      - name: Seed judge (skip-clean without the claude CLI)
        run: python3 tools/security-audit-validation/judge/run_seed_judge.py --votes 3
