# Semgrep rule pack for the security-audit skill validation campaign.
#
# These rules model the *deterministic static lane* of the `security-auditor`
# subagent's SAST pass. They run offline against the fixture corpus under
# corpus/ with `--config` (no rules registry fetch). Each rule id is mapped back
# to a dispatch family by corpus.py via the `family:` tag in `metadata`.
#
# Design notes:
#  * Taint mode is used where a value must FLOW from a user source to a sink
#    (so a value laundered through an intermediate variable is still caught,
#    and a value coerced through a sanitizer like `(int)` is cleared).
#  * Pattern mode is used where the SINK ITSELF is the signal regardless of
#    immediate source (eval/unserialize of any value, weak-hash on a
#    credential-named variable, a hardcoded secret literal, an XXE flag).
#  * Clean fixtures are written so no taint reaches the sink (the value is
#    rebuilt from a constant/allowlist or passed through a real sanitizer),
#    so a correct rule stays silent on them.
rules:
  # --- SQLi / DQL (CWE-89) ------------------------------------------------
  - id: sa-sqli-taint
    mode: taint
    languages: [php]
    severity: ERROR
    message: User input reaches a SQL query string (CWE-89, A03:2021).
    metadata:
      family: sqli
      cwe: CWE-89
      owasp: A03:2021
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - pattern: $_COOKIE
      - pattern: $_SERVER
      - pattern: filter_input(...)
      - pattern: filter_input_array(...)
      - pattern: getallheaders()
      - pattern: apache_request_headers()
      - pattern: $_FILES
    pattern-sanitizers:
      - pattern: (int)$X
      - pattern: (integer)$X
      - pattern: intval(...)
      # Driver-correct escaping/quoting neutralizes the value for SQL.
      - pattern: $DB->quote(...)
      - pattern: mysqli_real_escape_string(...)
      - pattern: $DB->real_escape_string(...)
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: $OBJ->query($Q)
              - pattern: $OBJ->exec($Q)
              - pattern: $OBJ->createQuery($Q)
              # Doctrine DBAL aliases — same SQL-string sink under another name.
              - pattern: $OBJ->executeQuery($Q)
              - pattern: $OBJ->executeStatement($Q)
              - pattern: $OBJ->executeUpdate($Q)
              # A prepared statement whose SQL is itself tainted prepares
              # nothing — the injection is live before execute() is reached.
              - pattern: $OBJ->prepare($Q)
              - pattern: mysqli_query(...)
              - pattern: mysqli_prepare(...)
              - pattern: pg_query(...)
          - pattern-not: $OBJ->query("...")
          - pattern-not: $OBJ->exec("...")
          - pattern-not: $OBJ->executeQuery("...")
          - pattern-not: $OBJ->executeStatement("...")
          - pattern-not: $OBJ->prepare("...")

  # --- OS command injection (CWE-78/77) ----------------------------------
  - id: sa-command-injection-taint
    mode: taint
    languages: [php]
    severity: ERROR
    message: User input reaches an OS command sink (CWE-78, A03:2021).
    metadata:
      family: command
      cwe: CWE-78
      owasp: A03:2021
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - pattern: $_COOKIE
      - pattern: $_SERVER
      - pattern: filter_input(...)
      - pattern: filter_input_array(...)
      - pattern: getallheaders()
      - pattern: apache_request_headers()
      - pattern: $_FILES
    pattern-sanitizers:
      # Only escapeshellarg fully neutralizes an argument; escapeshellcmd is
      # intentionally NOT a sanitizer (it leaves argument injection open).
      # Integer coercion also clears the value (no shell metacharacters can
      # survive), consistent with the SQLi/XSS sanitizer lists.
      - pattern: escapeshellarg(...)
      - pattern: (int)$X
      - pattern: (integer)$X
      - pattern: intval(...)
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: shell_exec(...)
              - pattern: exec(...)
              - pattern: system(...)
              - pattern: passthru(...)
              - pattern: proc_open(...)
              - pattern: popen(...)
              # pcntl_exec replaces the process image with a named program —
              # a command-execution sink that bypasses the shell entirely.
              - pattern: pcntl_exec(...)
          # proc_open with an ARRAY command argument does not invoke a shell,
          # so shell-metacharacter injection does not apply.
          - pattern-not: proc_open([...], ...)

  # --- OS command injection via the backtick operator (CWE-78) -----------
  # The backtick operator `...` is sugar for shell_exec() but is a distinct
  # AST node that the structural patterns above do not model. A backtick string
  # containing an interpolated variable is a command sink with dynamic content.
  - id: sa-command-backtick
    languages: [generic]
    severity: ERROR
    message: Backtick operator executes a shell command with interpolated data (CWE-78).
    metadata:
      family: command
      cwe: CWE-78
      owasp: A03:2021
    paths:
      include:
        - "*.php"
    pattern-regex: '`[^`]*\$[^`]*`'

  # --- Code injection / SSTI (CWE-94/1336) -------------------------------
  - id: sa-code-injection-taint
    mode: taint
    languages: [php]
    severity: ERROR
    message: User input reaches a code/template evaluation sink (CWE-94/1336, A03:2021).
    metadata:
      family: code
      cwe: CWE-94
      owasp: A03:2021
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - pattern: $_COOKIE
      - pattern: $_SERVER
      - pattern: filter_input(...)
      - pattern: filter_input_array(...)
      - pattern: getallheaders()
      - pattern: apache_request_headers()
      - pattern: $_FILES
    pattern-sinks:
      - pattern-either:
          - pattern: eval(...)
          - pattern: assert(...)
          - pattern: create_function(...)
          - pattern: $T->createTemplate(...)

  # --- Insecure deserialization (CWE-502) --------------------------------
  # Pattern mode (not taint): unserialize() of anything other than a constant
  # literal is dangerous regardless of whether the source is visible in the same
  # function — a value arriving as a parameter is just as attacker-reachable.
  # Only a string-literal argument (a fixed, developer-controlled payload) is
  # treated as safe.
  - id: sa-insecure-deserialization
    languages: [php]
    severity: ERROR
    message: unserialize() of a non-constant value (CWE-502, A08:2021).
    metadata:
      family: deserialization
      cwe: CWE-502
      owasp: A08:2021
    patterns:
      - pattern-either:
          - pattern: unserialize($X)
          - pattern: unserialize($X, ...)
          # Indirect invocation of unserialize through call_user_func.
          - pattern: call_user_func("unserialize", $X)
          - pattern: call_user_func('unserialize', $X)
          - pattern: call_user_func("unserialize", $X, ...)
          - pattern: call_user_func('unserialize', $X, ...)
          # yaml_parse with PHP-object support deserializes arbitrary objects.
          - pattern: yaml_parse($X)
          - pattern: yaml_parse($X, ...)
          # igbinary is a binary unserialize with the same object-injection risk.
          - pattern: igbinary_unserialize($X)
      - pattern-not: unserialize("...")
      - pattern-not: unserialize("...", ...)
      - pattern-not: yaml_parse("...")
      - pattern-not: yaml_parse("...", ...)

  # --- SSRF (CWE-918) ----------------------------------------------------
  - id: sa-ssrf-taint
    mode: taint
    languages: [php]
    severity: ERROR
    message: User input reaches an outbound request sink (CWE-918, A10:2021/API7:2023).
    metadata:
      family: ssrf
      cwe: CWE-918
      owasp: A10:2021
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - pattern: $_COOKIE
      - pattern: $_SERVER
      - pattern: filter_input(...)
      - pattern: filter_input_array(...)
      - pattern: getallheaders()
      - pattern: apache_request_headers()
      - pattern: $_FILES
    pattern-sanitizers:
      # A realpath()'d value is a contained local filesystem path, not an
      # attacker-chosen URL, so it cannot drive an outbound request. An
      # integer-coerced value cannot be a URL/host either.
      - pattern: realpath(...)
      - pattern: (int)$X
      - pattern: (integer)$X
      - pattern: intval(...)
    pattern-sinks:
      - pattern-either:
          - pattern: file_get_contents($U)
          - pattern: fopen($U, ...)
          - pattern: curl_setopt($CH, CURLOPT_URL, $U)
          - pattern: curl_setopt_array($CH, $U)
          - pattern: get_headers($U)
          - pattern: get_headers($U, ...)
          - pattern: $CLIENT->request($M, $U, ...)
          - pattern: $CLIENT->get($U, ...)

  # --- Path traversal / LFI (CWE-22) -------------------------------------
  - id: sa-path-traversal-taint
    mode: taint
    languages: [php]
    severity: ERROR
    message: User input reaches a filesystem path sink without containment (CWE-22).
    metadata:
      family: path
      cwe: CWE-22
      owasp: A01:2021
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - pattern: $_COOKIE
      - pattern: $_SERVER
      - pattern: filter_input(...)
      - pattern: filter_input_array(...)
      - pattern: getallheaders()
      - pattern: apache_request_headers()
      - pattern: $_FILES
    pattern-sanitizers:
      # realpath() + a prefix check is the proper containment primitive;
      # basename() alone is NOT sufficient and is intentionally not listed. An
      # integer-coerced value cannot carry a `../` traversal sequence.
      - pattern: realpath(...)
      - pattern: (int)$X
      - pattern: (integer)$X
      - pattern: intval(...)
    pattern-sinks:
      - pattern-either:
          - pattern: file_get_contents($P)
          - pattern: fopen($P, ...)
          - pattern: readfile($P)
          # Additional file-read sinks / aliases.
          - pattern: file($P)
          - pattern: file($P, ...)
          - pattern: highlight_file($P)
          - pattern: show_source($P)
          - pattern: copy($P, ...)
          - pattern: new SplFileObject($P, ...)
          - pattern: new SplFileObject($P)
          - pattern: new \SplFileObject($P, ...)
          - pattern: new \SplFileObject($P)
          - pattern: include($P)
          - pattern: include_once($P)
          - pattern: require($P)
          - pattern: require_once($P)

  # --- Reflected XSS (CWE-79) --------------------------------------------
  - id: sa-xss-echo-taint
    mode: taint
    languages: [php]
    severity: ERROR
    message: User input is echoed without output encoding (CWE-79, A03:2021).
    metadata:
      family: xss
      cwe: CWE-79
      owasp: A03:2021
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - pattern: $_COOKIE
      - pattern: $_SERVER
      - pattern: filter_input(...)
      - pattern: filter_input_array(...)
      - pattern: getallheaders()
      - pattern: apache_request_headers()
      - pattern: $_FILES
    pattern-sanitizers:
      - pattern: htmlspecialchars(...)
      - pattern: htmlentities(...)
      - pattern: (int)$X
      - pattern: intval(...)
    pattern-sinks:
      - pattern-either:
          - pattern: echo $X;
          - pattern: print $X;
          # printf-family writes user data straight to output.
          - pattern: printf(...)
          - pattern: vprintf(...)
          # exit/die emit their string argument to the response body.
          - pattern: exit($X)
          - pattern: die($X)
          # debug-dump helpers print their argument when not in return mode.
          - pattern: print_r($X)
          - pattern: var_dump($X)
          - pattern: var_export($X)
          # writing to the output stream is an echo by another name.
          - pattern: file_put_contents("php://output", $X)
          - pattern: file_put_contents('php://output', $X)

  # --- XSS via Twig raw filter (CWE-79) ----------------------------------
  - id: sa-xss-twig-raw
    languages: [generic]
    severity: WARNING
    message: Twig `raw` filter disables output encoding (CWE-79).
    metadata:
      family: xss
      cwe: CWE-79
      owasp: A03:2021
    paths:
      include:
        - "*.php"
        - "*.twig"
    pattern-regex: '\{\{[^}]*\|\s*raw'

  # --- Weak cryptography on a credential (CWE-327/326) -------------------
  - id: sa-weak-hash-credential
    languages: [php]
    severity: ERROR
    message: Weak hash (md5/sha1) used on a credential-named value (CWE-327/326, A02:2021).
    metadata:
      family: crypto
      cwe: CWE-327
      owasp: A02:2021
    patterns:
      - pattern-either:
          - pattern: md5($P)
          - pattern: sha1($P)
          # hash() / hash_hmac() alias forms of the same weak primitives.
          - pattern: hash("md5", $P)
          - pattern: hash('md5', $P)
          - pattern: hash("sha1", $P)
          - pattern: hash('sha1', $P)
          - pattern: hash_hmac("md5", $P, ...)
          - pattern: hash_hmac('md5', $P, ...)
          - pattern: hash_hmac("sha1", $P, ...)
          - pattern: hash_hmac('sha1', $P, ...)
          # crypt() with a weak/auto scheme on a credential.
          - pattern: crypt($P)
          - pattern: crypt($P, ...)
          # mhash() with a weak algorithm constant.
          - pattern: mhash(MHASH_MD5, $P, ...)
          - pattern: mhash(MHASH_MD5, $P)
          - pattern: mhash(MHASH_SHA1, $P, ...)
          - pattern: mhash(MHASH_SHA1, $P)
      - metavariable-regex:
          metavariable: $P
          regex: (?i).*(pass|pwd|secret|token|credential|api_?key).*

  # --- Hardcoded credentials (CWE-798) -----------------------------------
  - id: sa-hardcoded-secret
    languages: [php]
    severity: ERROR
    message: Hardcoded credential literal (CWE-798, A02:2021).
    metadata:
      family: secret
      cwe: CWE-798
      owasp: A02:2021
    patterns:
      - pattern-either:
          - pattern: $K = "...";
          # A hardcoded credential as the default of a null-coalesce — a
          # backdoor default that ships in the artifact when config is absent.
          - pattern: $K = $V ?? "...";
          - pattern: '$K = $V ?: "...";'
      - metavariable-regex:
          metavariable: $K
          regex: (?i)^\$(api_?key|secret|password|passwd|pwd|private_?key|access_?key|auth_?token|client_?secret)$
      - pattern-not: $K = "";

  # --- Hardcoded credential assigned to a credential-named property -------
  - id: sa-hardcoded-secret-property
    languages: [php]
    severity: ERROR
    message: Hardcoded credential literal assigned to a property (CWE-798, A02:2021).
    metadata:
      family: secret
      cwe: CWE-798
      owasp: A02:2021
    patterns:
      - pattern-either:
          - pattern: $O->$F = "...";
          - pattern: $O->$F = $V ?? "...";
      - metavariable-regex:
          metavariable: $F
          regex: (?i)^(api_?key|secret|password|passwd|pwd|private_?key|access_?key|auth_?token|client_?secret)$
      - pattern-not: $O->$F = "";

  # --- Hardcoded credential defined as a named constant -------------------
  # A regex rule: metavariable-regex does not bind to string-literal arguments
  # of define() in this engine, so match the call shape directly. Requires a
  # credential-named constant AND a non-empty literal value.
  - id: sa-hardcoded-secret-define
    languages: [generic]
    severity: ERROR
    message: Hardcoded credential literal in a define() constant (CWE-798, A02:2021).
    metadata:
      family: secret
      cwe: CWE-798
      owasp: A02:2021
    paths:
      include:
        - "*.php"
    pattern-regex: '(?i)define\s*\(\s*[''"][a-z0-9_]*(api_?key|secret|password|passwd|pwd|private_?key|access_?key|auth_?token|client_?secret)[a-z0-9_]*[''"]\s*,\s*[''"][^''"]+[''"]'

  # --- XXE via LIBXML_NOENT (CWE-611) ------------------------------------
  - id: sa-xxe-noent
    languages: [php]
    severity: ERROR
    message: XML parsed with LIBXML_NOENT enables external entity expansion (CWE-611, A05:2021).
    metadata:
      family: xxe
      cwe: CWE-611
      owasp: A05:2021
    pattern-either:
      - pattern: $D->loadXML(..., LIBXML_NOENT, ...)
      - pattern: $D->load(..., LIBXML_NOENT, ...)
      - pattern: simplexml_load_string(..., LIBXML_NOENT, ...)
      - pattern: simplexml_load_file(..., LIBXML_NOENT, ...)
      # XMLReader is a separate streaming parser; enabling SUBST_ENTITIES turns
      # on the same external-entity expansion as LIBXML_NOENT.
      - pattern: $R->setParserProperty(XMLReader::SUBST_ENTITIES, true)
      - pattern: $R->setParserProperty(\XMLReader::SUBST_ENTITIES, true)
      # DOMDocument::$resolveExternals = true re-enables external entity loading.
      - pattern: $D->resolveExternals = true
    # NOTE: the explicit LIBXML_NOENT constant is the reliable signal; a
    # variable flags-arg is intentionally not asserted by the corpus.

  # --- Open redirect (CWE-601) -------------------------------------------
  - id: sa-open-redirect-taint
    mode: taint
    languages: [php]
    severity: ERROR
    message: User input reaches a Location header (CWE-601, A01:2021).
    metadata:
      family: redirect
      cwe: CWE-601
      owasp: A01:2021
    pattern-sources:
      - pattern: $_GET
      - pattern: $_POST
      - pattern: $_REQUEST
      - pattern: $_COOKIE
      - pattern: $_SERVER
      - pattern: filter_input(...)
      - pattern: filter_input_array(...)
      - pattern: getallheaders()
      - pattern: apache_request_headers()
      - pattern: $_FILES
    pattern-sanitizers:
      # An integer-coerced value cannot carry a URL/host, so it cannot drive an
      # open redirect (consistent with the SQLi/XSS/command sanitizer lists).
      - pattern: (int)$X
      - pattern: (integer)$X
      - pattern: intval(...)
    pattern-sinks:
      - pattern-either:
          - pattern: header($H)
          - pattern: header($H, ...)
          - pattern: 'header("Location: " . $H)'
          - pattern: 'header("Location: " . $H, ...)'
